# celiums-memory — Production triple-store stack
#
# One command. Real persistence. Survives restarts.
#
#   docker compose up -d
#
# Then:
#   curl http://localhost:3210/health
#   curl -X POST http://localhost:3210/store -H 'Content-Type: application/json' \
#     -d '{"content":"hello","userId":"alice"}'
#   curl -X POST http://localhost:3210/recall -H 'Content-Type: application/json' \
#     -d '{"query":"hello","userId":"alice"}'

services:

  # ───────────────────────────────────────────
  #  PostgreSQL 17 + pgvector — long-term memory
  # ───────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: celiums
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-celiums_dev_password_change_me}
      POSTGRES_DB: celiums_memory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celiums -d celiums_memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ───────────────────────────────────────────
  #  Qdrant — vector store (semantic search)
  # ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ───────────────────────────────────────────
  #  Valkey — working memory cache + distributed mutex
  # ───────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: >
      valkey-server
      --requirepass ${VALKEY_PASSWORD:-celiums_dev_password_change_me}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a ${VALKEY_PASSWORD:-celiums_dev_password_change_me} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ───────────────────────────────────────────
  #  celiums-memory server
  # ───────────────────────────────────────────
  celiums-memory:
    image: celiums/memory:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://celiums:${POSTGRES_PASSWORD:-celiums_dev_password_change_me}@postgres:5432/celiums_memory
      QDRANT_URL: http://qdrant:6333
      VALKEY_URL: redis://:${VALKEY_PASSWORD:-celiums_dev_password_change_me}@valkey:6379
      PORT: 3210
      PERSONALITY: ${PERSONALITY:-balanced}
    ports:
      - "${CELIUMS_PORT:-3210}:3210"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3210/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  valkey_data:
