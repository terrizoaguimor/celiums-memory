# SPDX-License-Identifier: Apache-2.0
# Celiums Memory release pipeline — implements ADR-018 §"Tag v*.*.*".
#
# On tag push (v*.*.*):
#   1. Build multi-arch Docker image
#   2. Scan with Trivy + Grype
#   3. Generate SBOM with Syft (SPDX + CycloneDX)
#   4. Sign image + chart + npm tarball with cosign (keyless OIDC)
#   5. Publish to GHCR + npm + GitHub Releases
#   6. Attach SBOM + signatures to the GH Release

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/celiums-memory

jobs:
  # ── Tests must pass on the tagged commit ─────────────────────────
  test:
    name: Tests (pre-release gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @celiums/memory test

  # ── Build + push multi-arch image ────────────────────────────────
  docker:
    name: Build + push image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # cosign keyless OIDC
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tags:   ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Build + push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom:       true

      # ── Scan image (Trivy) ──────────────────────────────────────
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      # ── Generate SBOMs (Syft) ───────────────────────────────────
      - name: Syft SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: celiums-memory.spdx.json
      - name: Syft SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: celiums-memory.cdx.json

      # ── cosign keyless sign ─────────────────────────────────────
      - uses: sigstore/cosign-installer@v3
      - name: cosign sign image + attach SBOM
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          cosign attest --yes \
            --predicate celiums-memory.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          cosign attest --yes \
            --predicate celiums-memory.cdx.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      # ── Upload artefacts to workflow run ────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            celiums-memory.spdx.json
            celiums-memory.cdx.json

  # ── Build + push Helm chart ──────────────────────────────────────
  chart:
    name: Publish Helm chart
    needs: [test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write     # to attach to GH Release
      packages: write     # OCI push to GHCR
      id-token: write     # cosign keyless
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync chart appVersion with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" charts/celiums-memory/Chart.yaml
      - name: helm dependency + package
        run: |
          helm dependency build ./charts/celiums-memory
          helm package ./charts/celiums-memory -d /tmp/charts/
      - name: Push chart to OCI registry
        env:
          HELM_EXPERIMENTAL_OCI: '1'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            ${{ env.REGISTRY }} \
            -u ${{ github.actor }} --password-stdin
          helm push /tmp/charts/celiums-memory-*.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
      - uses: sigstore/cosign-installer@v3
      - name: cosign sign chart artefact
        run: |
          for chart in /tmp/charts/celiums-memory-*.tgz; do
            cosign sign-blob --yes \
              --output-signature "$chart.sig" \
              --output-certificate "$chart.pem" \
              "$chart"
          done

      - name: Upload chart to GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/charts/celiums-memory-*.tgz
            /tmp/charts/celiums-memory-*.tgz.sig
            /tmp/charts/celiums-memory-*.tgz.pem
          draft: false
          generate_release_notes: true

  # ── Publish package via pnpm ─────────────────────────────────────
  # pnpm-only policy: the repo standardises on pnpm to reduce npm
  # supply-chain risk (see security posture in SECURITY.md). pnpm
  # publish proxies the underlying npm registry but with pnpm's
  # stricter sandboxing — no transitive postinstall scripts execute.
  publish-package:
    name: Publish to npm registry (via pnpm)
    needs: [test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # for SLSA provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @celiums/memory build
      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @celiums/memory publish --access public --provenance --no-git-checks

  # ── Final release notes update ───────────────────────────────────
  release-notes:
    name: Append SBOM + signatures to release
    needs: [docker, chart, publish-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sboms
          path: /tmp/sboms
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/sboms/celiums-memory.spdx.json
            /tmp/sboms/celiums-memory.cdx.json
