name: Bug Report
description: Report a bug in celiums-memory
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Which module is affected?
      options:
        - limbic (emotional state)
        - recall (memory search)
        - store (storage)
        - personality (OCEAN traits)
        - pfc (regulation)
        - reward (dopamine)
        - middleware (LLM wrapper)
        - server (REST API)
        - adapter-mcp
        - adapter-langchain
        - adapter-llamaindex
        - cli
        - other
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g., 20.11.0"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Running mode
      options:
        - In-memory (dev)
        - Production (PG+Qdrant+Valkey)
        - Docker Compose
    validations:
      required: true
