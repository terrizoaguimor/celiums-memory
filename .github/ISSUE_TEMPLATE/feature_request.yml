name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you implement this?
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Which architectural layer?
      options:
        - Layer 3 - Metacognition (personality, ToM, PFC)
        - Layer 2 - Limbic (emotions, memory, recall)
        - Layer 1 - Autonomic (ANS, reward, circadian)
        - Infrastructure (Docker, CI/CD, adapters)
        - Documentation
        - Other
    validations:
      required: true
