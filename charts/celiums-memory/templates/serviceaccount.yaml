{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "celiums-memory.serviceAccountName" . }}
  labels:
    {{- include "celiums-memory.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ eq .Values.secrets.backend "kubernetes" | ternary true false }}
{{- end }}
