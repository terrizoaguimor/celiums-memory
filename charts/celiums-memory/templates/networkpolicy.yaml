{{- if .Values.networkPolicy.enabled -}}
# Default-deny egress + named allowlist per ADR-006.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "celiums-memory.fullname" . }}
  labels:
    {{- include "celiums-memory.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "celiums-memory.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress from the cluster's ingress controller namespace.
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - port: http
          protocol: TCP
    # Ingress from Prometheus for /metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: metrics
          protocol: TCP
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allowlist for Postgres (when external).
    {{- if .Values.externalServices.postgres.host }}
    - to: []
      ports:
        - port: {{ .Values.externalServices.postgres.port }}
          protocol: TCP
    {{- end }}
    # Allowlist for Qdrant (when external).
    {{- if .Values.externalServices.qdrant.url }}
    - to: []
      ports:
        - port: 6334
          protocol: TCP
    {{- end }}
    # Allowlist for Valkey (when external).
    {{- if .Values.externalServices.valkey.url }}
    - to: []
      ports:
        - port: 6379
          protocol: TCP
    {{- end }}
    # HTTPS egress for LLM providers + OIDC issuer + calibration.celiums.ai.
    - to: []
      ports:
        - port: 443
          protocol: TCP
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
