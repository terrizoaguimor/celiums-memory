{{- if and .Values.serviceAccount.create (eq .Values.secrets.backend "kubernetes") -}}
# Minimal Role: read Secrets only (per ADR-005 k8s backend).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "celiums-memory.fullname" . }}-secrets-reader
  labels:
    {{- include "celiums-memory.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "celiums-memory.fullname" . }}-secrets-reader
  labels:
    {{- include "celiums-memory.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "celiums-memory.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "celiums-memory.fullname" . }}-secrets-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
