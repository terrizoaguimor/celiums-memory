apiVersion: v1
kind: Namespace
metadata:
  name: router
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celiums-router
  namespace: router
  labels:
    app: celiums-router
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: celiums-router
  template:
    metadata:
      labels:
        app: celiums-router
    spec:
      imagePullSecrets:
        - name: registry-celiums-cr
      containers:
        - name: router
          image: registry.digitalocean.com/celiums-cr/engine:router-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - secretRef:
                name: celiums-router-env
          env:
            - name: NODE_ENV
              value: production
            - name: INFERENCE_URL
              value: "https://inference.do-ai.run"
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: celiums-router
  namespace: router
spec:
  selector:
    app: celiums-router
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: celiums-router
  namespace: router
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`router.celiums.ai`)
      kind: Rule
      services:
        - name: celiums-router
          port: 5000
  tls:
    secretName: celiums-ai-wildcard-tls
